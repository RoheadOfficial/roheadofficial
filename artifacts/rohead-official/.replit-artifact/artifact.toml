kind = "web"
previewPath = "/"
title = "ROHEAD OFFICIAL"
version = "1.0.0"
id = "artifacts/rohead-official"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18411

[services.development]
run = "pnpm --filter @workspace/rohead-official run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rohead-official", "run", "build" ]
publicDir = "artifacts/rohead-official/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18411"
BASE_PATH = "/"
